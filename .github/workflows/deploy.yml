name: Deploy changed sites to Vercel

on:
  push:
    branches: [main]

jobs:
  detect:
    name: Detect changed sites
    runs-on: ubuntu-latest
    outputs:
      sites: ${{ steps.changes.outputs.sites }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: changes
        name: Find changed site folders
        run: |
          # Top-level folders changed since previous commit (compared to HEAD^)
          changed=$(git diff --name-only HEAD^ HEAD | awk -F/ 'NF>1 {print $1}' | sort -u)
          # Keep only those that have .vercel/project.json (i.e. linked to a Vercel project)
          sites="[]"
          arr=""
          for d in $changed; do
            if [ -f "$d/.vercel/project.json" ]; then
              arr="$arr\"$d\","
            fi
          done
          if [ -n "$arr" ]; then
            sites="[${arr%,}]"
          fi
          echo "Detected: $sites"
          echo "sites=$sites" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy ${{ matrix.site }}
    needs: detect
    if: needs.detect.outputs.sites != '[]' && needs.detect.outputs.sites != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        site: ${{ fromJson(needs.detect.outputs.sites) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Read project ID
        id: pid
        run: |
          PID=$(jq -r '.projectId' "${{ matrix.site }}/.vercel/project.json")
          echo "id=$PID" >> "$GITHUB_OUTPUT"

      - name: Pull Vercel environment
        working-directory: ${{ matrix.site }}
        run: |
          vercel pull --yes --environment=production \
            --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ steps.pid.outputs.id }}

      - name: Deploy to production
        working-directory: ${{ matrix.site }}
        run: |
          vercel deploy --prod \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ steps.pid.outputs.id }}
