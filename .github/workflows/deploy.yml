name: Deploy changed sites to Vercel

on:
  push:
    branches: [main]

jobs:
  detect:
    name: Detect changed sites
    runs-on: ubuntu-latest
    outputs:
      sites: ${{ steps.changes.outputs.sites }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: changes
        name: Find changed site folders
        run: |
          changed=$(git diff --name-only HEAD^ HEAD | awk -F/ 'NF>1 {print $1}' | sort -u)
          arr=""
          for d in $changed; do
            if [ -f "$d/.vercel/project.json" ]; then
              arr="$arr\"$d\","
            fi
          done
          sites="[]"
          if [ -n "$arr" ]; then
            sites="[${arr%,}]"
          fi
          echo "Detected: $sites"
          echo "sites=$sites" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy ${{ matrix.site }}
    needs: detect
    if: needs.detect.outputs.sites != '[]' && needs.detect.outputs.sites != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        site: ${{ fromJson(needs.detect.outputs.sites) }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy ${{ matrix.site }}
        working-directory: ${{ matrix.site }}
        env:
          VERCEL_PROJECT_ID: ${{ env.VPID }}
        run: |
          export VERCEL_PROJECT_ID=$(jq -r '.projectId' .vercel/project.json)
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel deploy --prod --token="$VERCEL_TOKEN" --yes
