<style>.image-radio-widget{
    width: 144px;
    height: 184px;
    background: #EBEBEB;
    border-radius: 24px;
    overflow: visible;
    position: relative;
}
.image-radio-widget label{
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    width: 100%;
    height: 100%;
    position: relative;
    z-index: 2;
    color: #000000;
}
.image-radio-widget label img{
    order: 1;
    width: 100%;
    border-radius: 24px;
}
.image-radio-widget label span{
    order: 2;
    font-size: 16px;
    font-weight: 600;
    line-height: 21px;
    padding: 17px 16px;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: flex-start;
    width: 100%;
    overflow: hidden;
    flex-shrink: 0;
    position: relative;

    min-height: 55px;
    padding: 5px 16px;
}
.image-radio-widget label span:before{
    margin: 0 12px 0 0;
    display: inline-block;
    width: 24px;
    height: 24px;
    border-radius: 12px;
    border: 2px solid #bfbfbf;
    content:"";
    flex-shrink: 0;
}
.image-radio-widget input{
    display: none;
}

.image-radio-widget.selected label span:before{
    opacity: 0;
}
.image-radio-widget .image-radio-widget-selected-background{
    z-index: 1;
    border-radius: inherit;
    background: #0080FF;
}
.image-radio-widget .image-radio-widget-selected-background:before{
    content:"";
    background:inherit;
    position: absolute;
    left: 0;
    top: 0;
    right: 0;
    bottom: 0;
    border-radius: inherit;
    opacity: 0;
    transition: opacity 0.5s ease;
}
.image-radio-widget .image-radio-widget-selected-background:after{
    content:"";
    background:inherit;
    background-image: url(/images/ok.svg);
    background-position: center center;
    background-repeat: no-repeat;
    width: 24px;
    height: 24px;
    border-radius: 12px;
    position: absolute;
    bottom: 0;
    left: 0;
    margin: 17px 16px;
    transition: opacity 0.3s ease;
    opacity: 0;
}

.image-radio-widget.selected label+.image-radio-widget-selected-background:before{
    opacity: 0.1;
}
.image-radio-widget.selected label+.image-radio-widget-selected-background:after{
    opacity: 1;
}
.image-radio-widget.center label span,
.image-radio-widget.hidden-radio label span,
.image-radio-widget.hidden-label label span{
    text-align: center;
    justify-content: center;
    padding-left: 8px;
    padding-right: 8px;
}
.image-radio-widget.hidden-radio label span::before,
.image-radio-widget.hidden-radio .image-radio-widget-selected-background::after {
    display: none;
}

.image-radio-widget.selected label span{
    color: #0080FF;
}
.image-radio-widget.hidden-radio.selected label span{
    color: #0080FF;
}

.image-radio-widget.hidden-label label span::before{
    margin: 0;
}
.image-radio-widget.hidden-label .image-radio-widget-selected-background::after{
    margin-left: -12px;
    left: 50%;
}

.image-radio-widget.center label span:before{
    margin: 0;
}

.image-radio-widget.center .image-radio-widget-selected-background::after{
    left: calc(50% - 27px);
}


.image-radio-widget{
    user-select: none;
    -moz-user-select: none;
    -webkit-user-select: none;
    transition: all var(--button-animation-speed, 0.2s) ease-out;
}
.image-radio-widget.active{
    transform: scale(0.95);
}
</style>

var TrackingManager = function(params){

};
TrackingManager.prototype = {
    batch: [],
    timer: null,
    url: null,

    /**
     * Tracks a provided event by adding it to a batch for processing.
     * If a timer exists, it clears the previous timer and sets a new timeout
     * to ensure batched events are flushed after a delay.
     *
     * @param {string} provider - The name of the event provider.
     * @param {string} eventName - The name of the event to track.
     * @param {Object} eventData - An object containing additional event data.
     */
    track: function (provider, eventName, eventData) {
        this.batch.push({
            provider: provider,
            eventName: eventName,
            eventData: eventData
        });

        if (this.timer) {
            clearTimeout(this.timer);
        }

        this.timer = setTimeout(() => {
            this.flush();
        }, 10);
    },
    /**

     *
     * This method creates a deep copy of the current `batch`, clears the existing `batch` array,
     * and sends the copied data using an AJAX POST request to the specified `url` property.
     *
     * It is used to flush the accumulated data in `batch` and ensure that any modifications
     * to the `batch` property after the method call do not affect the data being transmitted.
     */
    flush: function () {
        let batch = JSON.parse(JSON.stringify(this.batch));
        this.batch = [];

        ajax.post(this.url, {data: JSON.stringify(batch)});
    }
}
var initTrackingManager = function(params){
    return new TrackingManager(params);
}

}

}

.answers-widget.with-background{
    position: relative;
}

.answers-widget-background{
    position: absolute;

}

.answers-widget-background-wrapper{
    position: absolute;

.answers-widget-background-wrapper.position-top_left{

}

.answers-widget-background-wrapper.position-top_right{
    top: 0;

}

.answers-widget-background-wrapper.position-bottom_right{

.answers-widget-background-wrapper.size-50p{

.answers-widget-position-top_left{

}

.answers-widget-position-top_right{

}.hidden-radio-widget{
    width: 100%;
    background: #EBEBEB77;
    border-radius: 32px;
    overflow: hidden;
    position: relative;
    margin: 0 0 8px 0;

}
.hidden-radio-widget label{
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: flex-start;
    width: 100%;
    height: 64px;
    position: relative;
    z-index: 2;
    color: #000000;
    padding: 0 24px 0 24px;
    cursor: pointer;
}
.hidden-radio-widget label img{
    height: 32px;
    width: 32px;
    object-fit: contain;
    object-position: center;
    margin: 0 16px;
}

.hidden-radio-widget label svg{
    max-width: 32px;
    max-height: 32px;
    margin: 0 16px;
}

.hidden-radio-widget label img:first-child, .hidden-radio-widget label svg:first-child{
    margin-left: 0;
}
.hidden-radio-widget label span{
    order: 2;
    font-size: 16px;
    font-weight: 500;
    line-height: 21px;
    letter-spacing: 0.15px;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: flex-start;
    width: 100%;
    overflow: hidden;
    /*flex-shrink: 0;*/
    position: relative;
}
.hidden-radio-widget input{
    display: none;
}
.hidden-radio-widget .hidden-radio-widget-selected-background{
    z-index: 1;
    border-radius: inherit;
    background: #0080FF;
}
.hidden-radio-widget .hidden-radio-widget-selected-background:before{
    content:"";
    background:inherit;
    position: absolute;
    left: 0;
    top: 0;
    right: 0;
    bottom: 0;
    border-radius: inherit;
    opacity: 0;
    transition: opacity 0.5s ease;
}
.hidden-radio-widget .hidden-radio-widget-selected-background:after{
    content:"";
    background:inherit;
    background-image: url(/images/ok.svg);
    background-position: center center;
    background-repeat: no-repeat;
    width: 24px;
    height: 24px;
    border-radius: 12px;
    position: absolute;
    bottom: 0;
    right: 0;
    margin: 21px 24px;
    transition: opacity 0.3s ease;
    opacity: 0;
}

 .hidden-radio-widget.selected label{
    color: #0080FF;
}
.hidden-radio-widget.selected label+.hidden-radio-widget-selected-background:before{
    opacity: 0.1;
}
.hidden-radio-widget.selected label+.hidden-radio-widget-selected-background:after{
    opacity: 1;
}

.hidden-radio-widget{
    user-select: none;
    -moz-user-select: none;
    -webkit-user-select: none;
    transition: all var(--button-animation-speed, 0.2s) ease-out;
}
.hidden-radio-widget.active{
    transform: scale(0.95);
}
@keyframes waiting-spinner {
    0%   { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
.waiting-spinner-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    overflow: hidden;
    background-color: transparent;
    z-index: -1;
    opacity: 0;
    transition: opacity 0.2s ease-in-out;
}
.waiting-spinner-wrapper .waiting-spinner {
    display: none;
}
.waiting-spinner-wrapper.active {
    opacity: 1;
    z-index: 1000;
}
.waiting-spinner-wrapper.active .waiting-spinner {
    display: block;
    width: 64px;
    height: 64px;
    animation: waiting-spinner 1.2s linear infinite;
}
